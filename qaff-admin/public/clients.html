<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qaff Admin — إدارة العملاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b;
            --surface: #18181b;
            --surface-hover: #27272a;
            --border: #27272a;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: var(--bg-dark);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(56, 189, 248, 0.05), transparent 25%);
            font-family: 'Cairo', system-ui, sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        nav {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        nav h1 {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        nav .links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-right: 24px;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s ease;
            position: relative;
        }

        nav .links a.active,
        nav .links a:hover {
            color: var(--text-main);
        }

        nav .links a.active::after {
            content: '';
            position: absolute;
            bottom: -24px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
            box-shadow: 0 -2px 10px var(--primary);
        }

        nav .logout {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            transition: all 0.2s;
        }

        nav .logout:hover {
            background: #ef4444;
            color: #fff;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        h2 {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .btn-create {
            background: linear-gradient(135deg, var(--primary-hover), var(--primary));
            border: none;
            color: #fff;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.5);
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        thead th {
            padding: 16px 20px;
            text-align: right;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(39, 39, 42, 0.5);
            border-bottom: 1px solid var(--border);
        }

        tbody tr {
            transition: background 0.2s, transform 0.2s;
        }

        tbody tr:not(:last-child) td {
            border-bottom: 1px solid var(--border);
        }

        tbody tr:hover {
            background: var(--surface-hover);
        }

        tbody td {
            padding: 12px 14px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 8px;
            letter-spacing: 0.5px;
        }

        .status-running {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-stopped {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .status-suspended {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .actions {
            display: flex;
            gap: 6px;
            flex-wrap: nowrap;
            align-items: center;
        }

        .btn-sm {
            font-family: 'Cairo', sans-serif;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-sm:hover {
            transform: translateY(-1px);
        }

        .btn-start {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border-color: rgba(16, 185, 129, 0.2);
        }

        .btn-start:hover {
            background: rgba(16, 185, 129, 0.2);
        }

        .btn-stop {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.2);
        }

        .btn-stop:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .btn-suspend {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border-color: rgba(245, 158, 11, 0.2);
        }

        .btn-suspend:hover {
            background: rgba(245, 158, 11, 0.2);
        }

        .btn-resume {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border-color: rgba(59, 130, 246, 0.2);
        }

        .btn-resume:hover {
            background: rgba(59, 130, 246, 0.2);
        }

        .btn-pass {
            background: rgba(139, 92, 246, 0.1);
            color: #a855f7;
            border-color: rgba(139, 92, 246, 0.2);
        }

        .btn-pass:hover {
            background: rgba(139, 92, 246, 0.2);
        }

        .btn-code {
            background: rgba(236, 72, 153, 0.1);
            color: #ec4899;
            border-color: rgba(236, 72, 153, 0.2);
        }

        .btn-code:hover {
            background: rgba(236, 72, 153, 0.2);
        }

        .btn-slots {
            background: var(--surface-hover);
            color: var(--text-muted);
            border-color: var(--border);
        }

        .btn-slots:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn-delete {
            background: transparent;
            color: #ef4444;
            border: 1px dashed rgba(239, 68, 68, 0.4);
        }

        .btn-delete:hover {
            background: #ef4444;
            color: #fff;
            border-style: solid;
        }

        .port {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: #3b82f6;
            font-weight: 700;
            background: rgba(59, 130, 246, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .empty {
            text-align: center;
            padding: 80px;
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 600;
        }

        /* Modal */
        .modal-bg {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .6);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal-bg.show {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: scale(0.95) translateY(10px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-bg.show .modal {
            transform: scale(1) translateY(0);
        }

        .modal h3 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 28px;
            color: var(--text-main);
        }

        .form-row {
            margin-bottom: 20px;
        }

        .form-row label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .form-row input {
            font-family: 'Cairo', sans-serif;
            width: 100%;
            height: 48px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0 16px;
            color: var(--text-main);
            font-size: 15px;
            font-weight: 600;
            outline: none;
            transition: all 0.2s;
        }

        .form-row input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
        }

        .grid2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .modal-btns {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .modal-btns button {
            flex: 1;
            height: 44px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cancel {
            background: var(--bg-dark);
            color: var(--text-muted);
            border: 1px solid var(--border) !important;
        }

        .btn-cancel:hover {
            background: var(--border);
            color: var(--text-main);
        }

        .btn-submit {
            background: var(--primary);
            color: #fff;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .url-box {
            margin-top: 16px;
            background: #0f1117;
            border: 1px solid #2d3148;
            border-radius: 8px;
            padding: 14px 16px;
            font-family: monospace;
            font-size: 14px;
            color: #4ade80;
            word-break: break-all;
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1d27;
            border: 1px solid #4ade80;
            border-radius: 10px;
            padding: 12px 24px;
            font-size: 14px;
            color: #4ade80;
            display: none;
            z-index: 200;
        }

        .toast.error {
            border-color: #f87171;
            color: #f87171;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff44;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <nav>
        <h1>Qaff Admin</h1>
        <div class="links">
            <a href="/clients.html" class="active">العملاء</a>
            <a href="/stats.html">إحصائيات النظام</a>
        </div>
        <button class="logout" onclick="logout()">تسجيل الخروج</button>
    </nav>

    <main>
        <div class="top">
            <h2>إدارة العملاء</h2>
            <button class="btn-create" onclick="openCreateModal()">+ إنشاء عميل جديد</button>
        </div>

        <div id="table-wrap" style="overflow-x: auto; padding-bottom: 8px;">
            <table>
                <thead>
                    <tr>
                        <th>الرقم</th>
                        <th>واتساب</th>
                        <th>تاريخ الإنشاء</th>
                        <th>الرابط</th>
                        <th>البثوث</th>
                        <th>التخزين</th>
                        <th>التجديد</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="clients-tbody">
                    <tr>
                        <td colspan="8" class="empty">جاري التحميل...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Create Client Modal -->
    <div class="modal-bg" id="createModal">
        <div class="modal">
            <h3>➕ إنشاء عميل جديد</h3>
            <div class="form-row">
                <label>اسم العميل</label>
                <input type="text" id="c-name" placeholder="client_ahmed">
            </div>
            <div class="grid2">
                <div class="form-row">
                    <label>عدد Slots</label>
                    <input type="number" id="c-slots" value="50" min="1">
                </div>
                <div class="form-row">
                    <label>المساحة (GB)</label>
                    <input type="number" id="c-storage" value="20" min="1">
                </div>
            </div>
            <div class="grid2">
                <div class="form-row">
                    <label>رقم الواتساب (اختياري)</label>
                    <input type="text" id="c-wa" placeholder="+2010... أو 9665..." dir="ltr" style="text-align: right;">
                </div>
                <div class="form-row">
                    <label>تاريخ التجديد (اختياري)</label>
                    <input type="date" id="c-ren">
                </div>
            </div>
            <div class="grid2">
                <div class="form-row">
                    <label>كلمة السر (تُولد تلقائياً)</label>
                    <input type="text" id="c-pass" placeholder="اختياري...">
                </div>
                <div class="form-row">
                    <label>إجابة سؤال الأمان (تُولد تلقائياً)</label>
                    <input type="text" id="c-reset" placeholder="اختياري...">
                </div>
            </div>
            <div class="url-box" id="created-url"></div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeCreate()">إلغاء</button>
                <button class="btn-primary" id="createBtn" onclick="createClient()">إنشاء</button>
            </div>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div class="modal-bg" id="passModal">
        <div class="modal">
            <h3>🔑 تغيير كلمة السر</h3>
            <input type="hidden" id="p-client-id">
            <div class="form-row">
                <label>كلمة السر الحالية أو الجديدة</label>
                <input type="text" id="p-pass" placeholder="أدخل كلمة سر جديدة">
            </div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closePassModal()">إلغاء</button>
                <button class="btn-primary" onclick="changePassword()">حفظ وإعادة تشغيل</button>
            </div>
        </div>
    </div>

    <!-- Change Security Code Modal -->
    <div class="modal-bg" id="codeModal">
        <div class="modal">
            <h3>🛡️ مسح وتغيير رمز الأمان</h3>
            <input type="hidden" id="c-client-id">
            <div class="form-row">
                <label>إجابة سؤال الأمان (5 أحرف/أرقام)</label>
                <input type="text" id="c-reset-val" placeholder="رمز جديد مكون من 5 أحرف">
            </div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeCodeModal()">إلغاء</button>
                <button class="btn-primary" onclick="changeSecurityCode()">حفظ رمز الأمان</button>
            </div>
        </div>
    </div>

    <!-- Edit Slots Modal -->
    <div class="modal-bg" id="slotsModal">
        <div class="modal">
            <h3>✏️ تعديل عدد Slots</h3>
            <input type="hidden" id="s-client-id">
            <div class="form-row">
                <label>عدد Slots الجديد</label>
                <input type="number" id="s-slots" min="1">
            </div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeSlotsModal()">إلغاء</button>
                <button class="btn-primary" onclick="updateSlots()">حفظ</button>
            </div>
        </div>
    </div>

    <!-- Edit Info Modal -->
    <div class="modal-bg" id="infoModal">
        <div class="modal">
            <h3>✏️ تعديل بيانات العميل</h3>
            <input type="hidden" id="i-client-id">
            <div class="form-row">
                <label>رقم الواتساب الجديد</label>
                <input type="text" id="i-wa" placeholder="+2010... أو 9665..." dir="ltr" style="text-align: right;">
            </div>
            <div class="form-row">
                <label>تاريخ التجديد الجديد</label>
                <input type="date" id="i-ren">
            </div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeInfoModal()">إلغاء</button>
                <button class="btn-primary" onclick="updateInfo()">حفظ</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const T = () => localStorage.getItem('qaff_admin_token')
        const H = (body) => {
            const h = { 'Authorization': 'Bearer ' + T() }
            if (body) h['Content-Type'] = 'application/json'
            return h
        }
        const ip = location.hostname

        if (!T()) location.href = '/login'

        async function loadClients() {
            const res = await fetch('/api/clients', { headers: H() })
            if (res.status === 401) { location.href = '/login'; return }
            const data = await res.json()
            const tbody = document.getElementById('clients-tbody')
            if (!data.clients || !data.clients.length) {
                tbody.innerHTML = '<tr><td colspan="10" class="empty">لا يوجد عملاء بعد. أنشئ أول عميل!</td></tr>'
                return
            }
            tbody.innerHTML = data.clients.map(c => {
                const statusLabel = { running: 'نشط', stopped: 'موقوف', suspended: 'معلق' }[c.status] || c.status
                const statusClass = { running: 'status-running', stopped: 'status-stopped', suspended: 'status-suspended' }[c.status] || ''
                const url = `http://${ip}:${c.port}`

                const wa = c.whatsapp ? `<a href="https://wa.me/${c.whatsapp.replace(/[^0-9]/g, '')}" target="_blank" style="color:#4ade80;text-decoration:none;font-weight:700" dir="ltr">${c.whatsapp}</a>` : '<span style="color:#64748b">—</span>'

                let renHtml = '<span style="color:#64748b">—</span>'
                if (c.renewal_date) {
                    const rDate = new Date(c.renewal_date)
                    const today = new Date()
                    today.setHours(0, 0, 0, 0)
                    if (rDate <= today) {
                        renHtml = `<span style="color:#f87171;font-weight:700">${c.renewal_date}<br><span style="font-size:11px">⚠️ منتهى</span></span>`
                    } else {
                        renHtml = `<span style="color:#e2e8f0">${c.renewal_date}</span>`
                    }
                }

                const btns = []
                if (c.status === 'stopped') btns.push(`<button class="btn-sm btn-start" onclick="action(${c.id},'start')">▶ تشغيل</button>`)
                if (c.status === 'running') btns.push(`<button class="btn-sm btn-stop" onclick="action(${c.id},'stop')">⏸ إيقاف</button>`)
                if (c.status === 'running') btns.push(`<button class="btn-sm btn-suspend" onclick="action(${c.id},'suspend')">🚫 تعليق</button>`)
                if (c.status === 'suspended') btns.push(`<button class="btn-sm btn-resume" onclick="action(${c.id},'resume')">▶ استئناف</button>`)
                btns.push(`<button class="btn-sm btn-pass" onclick="openPassModal(${c.id},'${c.password || ''}')">🔑 كلمة السر</button>`)
                btns.push(`<button class="btn-sm btn-code" onclick="openCodeModal(${c.id},'${c.reset_answer || ''}')">🛡️ رمز الأمان</button>`)
                btns.push(`<button class="btn-sm btn-slots" onclick="openSlotsModal(${c.id},${c.slots})">✏️ Slots</button>`)
                btns.push(`<button class="btn-sm btn-slots" onclick="openInfoModal(${c.id},'${c.whatsapp || ''}','${c.renewal_date || ''}')">✏️ بيانات</button>`)
                btns.push(`<button class="btn-sm btn-delete" onclick="deleteClient(${c.id},'${c.name}')">🗑 حذف</button>`)

                return `<tr>
        <td>
            <div style="display:flex; flex-direction:column; gap:4px">
                <span style="color:#475569;font-weight:700">#${c.id} - ${c.name}</span>
                <span class="status-badge ${statusClass}" style="width:fit-content">${statusLabel}</span>
            </div>
        </td>
        <td>${wa}</td>
        <td style="font-size:12px;color:#475569">${c.created_at?.slice(0, 16) || '—'}</td>
        <td>
            <div style="display:flex; flex-direction:column; gap:2px">
                <span class="port" style="width:fit-content">${c.port}</span>
                <a href="${url}" target="_blank" style="color:#475569;font-size:11px;text-decoration:none">${url}</a>
            </div>
        </td>
        <td><span style="font-weight:800;color:#a78bfa">${c.slots}</span></td>
        <td>${c.storage_gb} GB</td>
        <td>${renHtml}</td>
        <td><div class="actions">${btns.join('')}</div></td>
      </tr>`
            }).join('')
        }

        async function action(id, act) {
            const method = act === 'delete' ? 'DELETE' : 'POST'
            const url = act === 'delete' ? `/api/clients/${id}` : `/api/clients/${id}/${act}`
            const res = await fetch(url, { method, headers: H() })
            const d = await res.json()
            if (d.success) { showToast('✅ تم بنجاح'); loadClients() }
            else showToast(d.error || 'خطأ', true)
        }

        async function deleteClient(id, name) {
            if (!confirm(`هل أنت متأكد من حذف العميل "${name}" بالكامل؟\nسيتم حذف كل بياناته.`)) return
            action(id, 'delete')
        }

        function openCreateModal() {
            document.getElementById('createModal').classList.add('show')
            document.getElementById('created-url').style.display = 'none'
            document.getElementById('createBtn').textContent = 'إنشاء'
        }
        function closeCreate() {
            document.getElementById('createModal').classList.remove('show')
            document.getElementById('c-name').value = ''
            document.getElementById('c-pass').value = ''
            document.getElementById('c-reset').value = ''
            document.getElementById('c-wa').value = ''
            document.getElementById('c-ren').value = ''
        }

        async function createClient() {
            const name = document.getElementById('c-name').value.trim()
            const slots = document.getElementById('c-slots').value
            const storage = document.getElementById('c-storage').value
            const wa = document.getElementById('c-wa').value.trim()
            const ren = document.getElementById('c-ren').value
            const pass = document.getElementById('c-pass').value
            const reset = document.getElementById('c-reset').value
            if (!name) { showToast('الاسم مطلوب', true); return }
            const btn = document.getElementById('createBtn')
            btn.innerHTML = '<span class="spinner"></span> يتم الإنشاء...'
            btn.disabled = true
            const res = await fetch('/api/clients', {
                method: 'POST', headers: H(true),
                body: JSON.stringify({ name, slots, storage_gb: storage, password: pass, whatsapp: wa, renewalDate: ren, reset_answer: reset })
            })
            const d = await res.json()
            btn.disabled = false; btn.textContent = 'إنشاء'
            if (d.success) {
                const urlBox = document.getElementById('created-url')
                urlBox.textContent = `✅ تم الإنشاء! الرابط: ${d.url}`
                urlBox.style.display = 'block'
                loadClients()
                setTimeout(closeCreate, 4000)
            } else showToast(d.error || 'فشل الإنشاء', true)
        }

        function openPassModal(id, pass) {
            document.getElementById('p-client-id').value = id
            document.getElementById('p-pass').value = pass
            document.getElementById('passModal').classList.add('show')
        }
        function closePassModal() {
            document.getElementById('passModal').classList.remove('show')
        }
        async function changePassword() {
            const id = document.getElementById('p-client-id').value
            const pass = document.getElementById('p-pass').value
            if (!pass || pass.length < 4) { showToast('يجب إدخال كلمة مرور (4+ أحرف)', true); return }
            const res = await fetch(`/api/clients/${id}/password`, {
                method: 'PUT', headers: H(true), body: JSON.stringify({ newPassword: pass })
            })
            const d = await res.json()
            if (d.success) { closePassModal(); showToast('✅ تم حفظ كلمة المرور وإعادة تشغيل الحاوية'); loadClients() }
            else showToast(d.error || 'خطأ', true)
        }

        function openCodeModal(id, reset) {
            document.getElementById('c-client-id').value = id
            document.getElementById('c-reset-val').value = reset
            document.getElementById('codeModal').classList.add('show')
        }
        function closeCodeModal() {
            document.getElementById('codeModal').classList.remove('show')
        }
        async function changeSecurityCode() {
            const id = document.getElementById('c-client-id').value
            const reset = document.getElementById('c-reset-val').value
            if (!reset) { showToast('يجب توافر رمز الأمان', true); return }
            const res = await fetch(`/api/clients/${id}/security-code`, {
                method: 'PUT', headers: H(true), body: JSON.stringify({ resetAnswer: reset })
            })
            const d = await res.json()
            if (d.success) { closeCodeModal(); showToast('✅ تم تحديث رمز الأمان'); loadClients() }
            else showToast(d.error || 'خطأ', true)
        }

        function openSlotsModal(id, current) {
            document.getElementById('s-client-id').value = id
            document.getElementById('s-slots').value = current
            document.getElementById('slotsModal').classList.add('show')
        }
        function closeSlotsModal() {
            document.getElementById('slotsModal').classList.remove('show')
        }
        async function updateSlots() {
            const id = document.getElementById('s-client-id').value
            const slots = document.getElementById('s-slots').value
            const res = await fetch(`/api/clients/${id}/slots`, {
                method: 'PUT', headers: H(true), body: JSON.stringify({ slots })
            })
            const d = await res.json()
            if (d.success) { closeSlotsModal(); showToast('✅ تم تحديث Slots'); loadClients() }
            else showToast(d.error || 'خطأ', true)
        }

        function openInfoModal(id, wa, ren) {
            document.getElementById('i-client-id').value = id
            document.getElementById('i-wa').value = wa || ''
            document.getElementById('i-ren').value = ren || ''
            document.getElementById('infoModal').classList.add('show')
        }
        function closeInfoModal() {
            document.getElementById('infoModal').classList.remove('show')
        }
        async function updateInfo() {
            const id = document.getElementById('i-client-id').value
            const whatsapp = document.getElementById('i-wa').value.trim()
            const renewalDate = document.getElementById('i-ren').value
            const res = await fetch(`/api/clients/${id}/info`, {
                method: 'PUT', headers: H(true), body: JSON.stringify({ whatsapp, renewalDate })
            })
            const d = await res.json()
            if (d.success) { closeInfoModal(); showToast('✅ تم تحديث البيانات'); loadClients() }
            else showToast(d.error || 'خطأ', true)
        }

        function logout() { localStorage.removeItem('qaff_admin_token'); location.href = '/login' }
        function showToast(msg, err = false) {
            const t = document.getElementById('toast')
            t.textContent = msg; t.className = 'toast' + (err ? ' error' : '')
            t.style.display = 'block'
            setTimeout(() => { t.style.display = 'none' }, 3500)
        }

        loadClients()
        setInterval(loadClients, 15000)
    </script>
</body>

</html>
