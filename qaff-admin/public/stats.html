<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qaff Admin — إحصائيات النظام</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b;
            --surface: #18181b;
            --surface-hover: #27272a;
            --border: #27272a;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: var(--bg-dark);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(56, 189, 248, 0.05), transparent 25%);
            font-family: 'Cairo', system-ui, sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        nav {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        nav h1 {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        nav .links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-right: 24px;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s ease;
            position: relative;
        }

        nav .links a.active,
        nav .links a:hover {
            color: var(--text-main);
        }

        nav .links a.active::after {
            content: '';
            position: absolute;
            bottom: -24px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
            box-shadow: 0 -2px 10px var(--primary);
        }

        nav .logout {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            transition: all 0.2s;
        }

        nav .logout:hover {
            background: #ef4444;
            color: #fff;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        h2 {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .grid-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .stat-card h3 {
            font-size: 16px;
            color: var(--text-muted);
            font-weight: 700;
        }

        .stat-card .value {
            font-size: 38px;
            font-weight: 800;
            color: var(--text-main);
            font-family: 'Cairo', sans-serif;
            letter-spacing: -1px;
        }

        .stat-card .desc {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #2d3148;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: #7c3aed;
            transition: width 0.3s ease-out, background-color 0.3s;
        }
    </style>
</head>

<body>
    <nav>
        <h1>Qaff Admin</h1>
        <div class="links">
            <a href="/clients.html">العملاء</a>
            <a href="/stats.html" class="active">إحصائيات النظام</a>
        </div>
        <button class="logout" onclick="logout()">تسجيل الخروج</button>
    </nav>

    <main>
        <div class="top">
            <h2>لوحة إحصائيات النظام (VPS)</h2>
        </div>

        <div class="grid-stats" id="statsGrid">
            <div style="color: #94a3b8; padding: 20px;">جاري تحميل البيانات الحية...</div>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('admin_token')
        if (!token) window.location.href = '/index.html'

        async function fetchStats() {
            try {
                const res = await fetch('/api/system-stats', {
                    headers: { 'Authorization': 'Bearer ' + token }
                })

                if (res.status === 401) {
                    window.location.href = '/index.html'
                    return
                }

                const data = await res.json()
                if (data.success) {
                    renderStats(data)
                }
            } catch (err) {
                console.error('Failed to fetch stats:', err)
            }
        }

        function formatBytes(bytes) {
            if (bytes === 0 || isNaN(bytes)) return '0 B'
            const k = 1024
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB']
            const i = Math.floor(Math.log(bytes) / Math.log(k))
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i]
        }

        function renderStats(data) {
            const grid = document.getElementById('statsGrid')

            const ramPercent = data.ram.total > 0 ? Math.round((data.ram.used / data.ram.total) * 100) : 0
            const diskPercent = data.disk.total > 0 ? Math.round((data.disk.used / data.disk.total) * 100) : 0

            const getHealthColor = (pct) => {
                if (pct > 85) return '#ef4444' // Red
                if (pct > 70) return '#f59e0b' // Yellow
                return '#10b981' // Green
            }

            const ramColor = getHealthColor(ramPercent)
            const diskColor = getHealthColor(diskPercent)
            const slotsPercent = data.slots.totalAllocated > 0 ? Math.round((data.slots.activeRunning / data.slots.totalAllocated) * 100) : 0

            grid.innerHTML = `
                <div class="stat-card">
                    <h3>استهلاك الذاكرة (RAM)</h3>
                    <div class="value" style="color: ${ramColor}">${ramPercent}%</div>
                    <div class="desc">مستخدم: ${formatBytes(data.ram.used)} | إجمالي: ${formatBytes(data.ram.total)}</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${ramPercent}%; background: ${ramColor};"></div>
                    </div>
                </div>

                <div class="stat-card">
                    <h3>مساحة التخزين (Disk)</h3>
                    <div class="value" style="color: ${diskColor}">${diskPercent}%</div>
                    <div class="desc">مستخدم: ${formatBytes(data.disk.used)} | إجمالي: ${formatBytes(data.disk.total)}</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${diskPercent}%; background: ${diskColor};"></div>
                    </div>
                </div>

                <div class="stat-card">
                    <h3>استهلاك القنوات (Slots)</h3>
                    <div class="value">${data.slots.activeRunning} / ${data.slots.totalAllocated}</div>
                    <div class="desc">القنوات المشغلة حالياً مقارنة بإجمالي القنوات الممنوحة</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${slotsPercent}%; background: #3b82f6;"></div>
                    </div>
                </div>

                <div class="stat-card">
                    <h3>العملاء (Clients)</h3>
                    <div class="value" style="color: #a855f7">${data.clients.running} / ${data.clients.total}</div>
                    <div class="desc">عدد الاشتراكات النشطة مقارنة بإجمالي المشتركين</div>
                </div>
            `
        }

        function logout() {
            localStorage.removeItem('admin_token')
            window.location.href = '/index.html'
        }

        fetchStats()
        // Poll every 5 seconds for live analytics
        setInterval(fetchStats, 5000)
    </script>
</body>

</html>
